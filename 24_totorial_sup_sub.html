<!DOCTYPE html>
<html>
<head>
    <title>Superscript and Subscript Example</title>
</head>
<body>

    <h1>Using Superscript and Subscript</h1>

    <!-- Superscript Example -->
    <p>Mathematics Expression:</p>
    <p>(a + b)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + 2ab</p>

    <!-- Subscript Example -->
    <p>Chemistry Formula:</p>
    <p>Glucose formula is C<sub>6</sub>H<sub>12</sub>O<sub>6</sub></p>

    <!-- Combined Example -->
    <p>Physics Example:</p>
    <p>E = mc<sup>2</sup> and CO<sub>2</sub> is Carbon Dioxide</p>

</body>
</html>
