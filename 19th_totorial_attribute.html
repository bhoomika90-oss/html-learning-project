<!DOCTYPE html>
<html>
<head>
    <title>HTML Attributes Example</title>
</head>
<body>

    <!-- Heading with style attribute -->
    <h1 style="color: blue;">Welcome to My Webpage</h1>

    <!-- Paragraph with title attribute -->
    <p title="This is a tooltip">Hover over this text</p>

    <!-- Link with href and target -->
    <a href="https://www.google.com" target="_blank">Open Google</a>

    <br><br>

    <!-- Image with src, alt, width, height -->
    <img src="https://via.placeholder.com/150" 
         alt="Sample Image" 
         width="150" 
         height="150">

    <br><br>

    <!-- Input box with placeholder -->
    <input type="text" placeholder="Enter your name">

    <br><br>

    <!-- Button with onclick -->
    <button onclick="alert('Hello! You clicked the button')">
        Click Me
    </button>

    <br><br>

    <!-- Paragraph with id and class -->
    <p id="para1" class="text">This is paragraph with id and class</p>

</body>
</html>
