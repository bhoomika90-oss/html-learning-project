<!DOCTYPE html>
<html>
<head>
    <title>Escape Characters Example</title>
</head>
<body>

<h2>Escape Characters Demo</h2>

<!-- Display HTML tags -->
<p>Showing HTML tag: &lt;h1&gt;Hello&lt;/h1&gt;</p>

<!-- Ampersand -->
<p>Company name: Johnson &amp; Johnson</p>

<!-- Quotes -->
<p>He said: &quot;HTML is easy&quot;</p>
<p>It's a sunny day: It&apos;s bright</p>

<!-- Symbols -->
<p>Copyright: &copy; 2026</p>
<p>Trademark: &trade;</p>
<p>Registered: &reg;</p>

<!-- Currency -->
<p>Price in Rupees: &#8377;500</p>
<p>Price in Euro: &euro;50</p>

<!-- Non-breaking space -->
<p>This&nbsp;&nbsp;&nbsp;has extra spaces</p>

</body>
</html>
